<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Symphony — Software. Beratung. Automatisierung.</title>
  <meta name="description" content="Code Symphony UG — Software, Beratung, Automatisierung.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- hreflang: alle Sprachvarianten -->
  <link rel="alternate" hreflang="de" href="https://code-symphony.de/de/">
  <link rel="alternate" hreflang="en" href="https://code-symphony.de/en/">
  <link rel="alternate" hreflang="es" href="https://code-symphony.de/es/">
  <link rel="alternate" hreflang="fr" href="https://code-symphony.de/fr/">
  <link rel="alternate" hreflang="x-default" href="https://code-symphony.de/">

  <!-- Redirect: erkennt Browser-Sprache und leitet weiter -->
  <script>
    (function() {
      var SUPPORTED = ['de', 'en', 'es', 'fr'];
      var DEFAULT = 'de';

      // 1. Gespeicherte Präferenz?
      var saved = localStorage.getItem('cs-lang');
      if (saved && SUPPORTED.indexOf(saved) !== -1) {
        window.location.replace('/' + saved + '/');
        return;
      }

      // 2. Browser-Sprache
      var browserLangs = navigator.languages || [navigator.language || DEFAULT];
      for (var i = 0; i < browserLangs.length; i++) {
        var lang = browserLangs[i].substring(0, 2).toLowerCase();
        if (SUPPORTED.indexOf(lang) !== -1) {
          window.location.replace('/' + lang + '/');
          return;
        }
      }

      // 3. Fallback: Deutsch
      window.location.replace('/' + DEFAULT + '/');
    })();
  </script>

  <!-- Noscript Fallback -->
  <meta http-equiv="refresh" content="0;url=/de/">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #07191E;
      color: #E2E8F0;
    }
    .redirect {
      text-align: center;
      font-size: 0.9rem;
    }
    .redirect a {
      color: #02F5A1;
      text-decoration: none;
      margin: 0 0.5em;
    }
    .redirect a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="redirect">
    <p>Weiterleitung… / Redirecting…</p>
    <p>
      <a href="/de/">Deutsch</a> |
      <a href="/en/">English</a> |
      <a href="/es/">Español</a> |
      <a href="/fr/">Français</a>
    </p>
  </div>
</body>
</html>
